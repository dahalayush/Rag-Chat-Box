<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sherpa — Nepal RAG Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141B22;
    --panel: #1A242E;
    --panel-alt: #212E3A;
    --border: #2C3A46;
    --text: #F2ECE2;
    --text-muted: #8FA0AD;
    --accent: #E8A33D;
    --accent-soft: rgba(232, 163, 61, 0.16);
    --teal: #6FA89B;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "Work Sans", sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }

  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---------- Hero / horizon ---------- */
  .hero {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .hero svg {
    display: block;
    width: 100%;
    height: 150px;
  }

  .hero-text {
    position: absolute;
    left: 24px;
    bottom: 18px;
  }

  .hero-text .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 4px;
  }

  .hero-text h1 {
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-size: 34px;
    margin: 0;
    letter-spacing: 0.01em;
  }

  .hero-text p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ---------- Chat card ---------- */
  .chat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 22px;
    min-height: 280px;
    max-height: 50vh;
    overflow-y: auto;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    max-width: 320px;
    line-height: 1.6;
  }

  .empty-state strong {
    display: block;
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .message.user {
    align-self: flex-end;
    background: var(--accent-soft);
    border: 1px solid rgba(232, 163, 61, 0.3);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message .role {
    display: block;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  /* ---------- Composer ---------- */
  .composer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid var(--border);
    background: var(--panel-alt);
  }

  .composer input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: "Work Sans", sans-serif;
    font-size: 14px;
    outline: none;
  }

  .composer input:focus {
    border-color: var(--accent);
  }

  .icon-btn, .primary-btn {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: "Work Sans", sans-serif;
    font-weight: 500;
    transition: transform 0.05s ease, background 0.15s ease;
  }

  .icon-btn {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn:hover { border-color: var(--accent); }

  .icon-btn.recording {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    animation: pulse 1.1s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(232, 163, 61, 0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(232, 163, 61, 0); }
    100% { box-shadow: 0 0 0 0 rgba(232, 163, 61, 0); }
  }

  .primary-btn {
    height: 42px;
    padding: 0 18px;
    background: var(--accent);
    color: #1A1306;
    font-size: 14px;
  }

  .primary-btn:hover { transform: translateY(-1px); }
  .primary-btn:disabled,
  .icon-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ---------- Footer row ---------- */
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 4px;
  }

  .status {
    font-family: "JetBrains Mono", monospace;
    min-height: 14px;
  }

  .reset-link {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: "Work Sans", sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .reset-link:hover { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .icon-btn.recording { animation: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <svg viewBox="0 0 600 150" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1E2E3D" />
            <stop offset="100%" stop-color="#10161D" />
          </linearGradient>
          <radialGradient id="sun" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.85" />
            <stop offset="100%" stop-color="#E8A33D" stop-opacity="0" />
          </radialGradient>
        </defs>
        <rect width="600" height="150" fill="url(#sky)" />
        <circle cx="440" cy="75" r="58" fill="url(#sun)" />
        <path d="M0,105 C60,80 120,115 180,90 C240,65 300,100 360,75 C420,55 480,90 540,70 C570,62 600,72 600,72 L600,150 L0,150 Z" fill="#2C3A46" opacity="0.7" />
        <path d="M0,130 L90,90 L160,125 L230,75 L300,120 L380,85 L460,128 L540,95 L600,120 L600,150 L0,150 Z" fill="#1C2630" />
        <path d="M0,150 L70,118 L150,150 L230,105 L260,118 L300,68 L340,118 L380,100 L460,150 L520,112 L600,150 Z" fill="#10161D" />
        <path d="M285,86 L300,68 L315,86 L306,80 L300,90 L294,80 Z" fill="#F2ECE2" opacity="0.85" />
      </svg>
      <div class="hero-text">
        <p class="eyebrow">Knowledge base · Nepal</p>
        <h1>Sherpa</h1>
        <p>Ask by text or voice — your guide to Nepal.</p>
      </div>
    </header>

    <main class="chat-card">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <strong>Namaste 🙏</strong>
          Ask something like "What is the capital of Nepal?" or tap the
          mic and ask out loud.
        </div>
      </div>

      <div class="composer">
        <input
          id="textInput"
          type="text"
          placeholder="Ask about Nepal..."
          autocomplete="off"
        />
        <button id="micBtn" class="icon-btn" title="Record a voice question" aria-label="Record voice question">🎙</button>
        <button id="sendBtn" class="primary-btn">Send</button>
      </div>
    </main>

    <div class="footer-row">
      <span class="status" id="status"></span>
      <button class="reset-link" id="resetBtn">Reset conversation</button>
    </div>
  </div>

  <audio id="player" hidden></audio>

  <script>
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusEl = document.getElementById('status');
    const player = document.getElementById('player');

    let recorder = null;
    let chunks = [];
    let isRecording = false;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addMessage(role, text) {
      if (emptyState) emptyState.remove();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const roleLabel = document.createElement('span');
      roleLabel.className = 'role';
      roleLabel.textContent = role === 'user' ? 'You' : 'Sherpa';
      const body = document.createElement('div');
      body.textContent = text;
      div.appendChild(roleLabel);
      div.appendChild(body);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      micBtn.disabled = busy;
      textInput.disabled = busy;
    }

    async function sendText() {
      const text = textInput.value.trim();
      if (!text) return;

      addMessage('user', text);
      textInput.value = '';
      setBusy(true);
      setStatus('Thinking...');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        addMessage('assistant', data.answer);
      } catch (err) {
        addMessage('assistant', 'Something went wrong reaching the assistant.');
        console.error(err);
      } finally {
        setBusy(false);
        setStatus('');
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          const blob = new Blob(chunks, { type: 'audio/webm' });
          await sendVoice(blob);
        };
        recorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        setStatus('Listening... tap again to stop');
      } catch (err) {
        console.error(err);
        setStatus('Microphone access was denied.');
      }
    }

    function stopRecording() {
      if (recorder && isRecording) {
        recorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
      }
    }

    async function sendVoice(blob) {
      setBusy(true);
      setStatus('Transcribing...');

      try {
        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');

        const res = await fetch('/voice-chat', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.transcript) addMessage('user', data.transcript);
        addMessage('assistant', data.answer);

        if (data.audio_url) {
          player.src = `${data.audio_url}?t=${Date.now()}`;
          player.hidden = false;
          await player.play().catch(() => {});
        }
      } catch (err) {
        addMessage('assistant', 'Something went wrong processing the recording.');
        console.error(err);
      } finally {
        setBusy(false);
        setStatus('');
      }
    }

    sendBtn.addEventListener('click', sendText);
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendText();
    });

    micBtn.addEventListener('click', () => {
      if (isRecording) stopRecording();
      else startRecording();
    });

    resetBtn.addEventListener('click', async () => {
      await fetch('/reset', { method: 'POST' });
      messagesEl.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML = '<strong>Conversation reset</strong>Ask something new whenever you are ready.';
      messagesEl.appendChild(div);
    });
  </script>
</body>
</html>
